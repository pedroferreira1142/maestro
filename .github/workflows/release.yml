# Build Windows + macOS packages and attach them to a GitHub Release.
# Triggers on version tags (v*) or manually via workflow_dispatch.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` also runs the `prepare` script (electron-vite build), so
      # out/ is ready before electron-builder packs it. node-pty ships
      # Node-API prebuilds — no native compilation happens anywhere.
      - name: Install dependencies and build
        run: npm ci

      - name: Package (electron-builder)
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: maestro-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  # Publish the package to npm (claude-maestro) on tag pushes, so `npx
  # claude-maestro` tracks each release. Skips cleanly if this version is
  # already on the registry (re-runs, or a manual npm publish beat CI to it).
  # Requires an NPM_TOKEN repo secret (npm "Automation" token).
  publish-npm:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Runs `prepare` (electron-vite build) so out/ is built before packing.
      - name: Install dependencies and build
        run: npm ci

      - name: Publish to npm (skip if this version is already published)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "claude-maestro@$VERSION" version >/dev/null 2>&1; then
            echo "claude-maestro@$VERSION already published — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
